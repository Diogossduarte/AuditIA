<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Agenda — Dra. Gabriela Porcaro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2321463B'/><stop offset='1' stop-color='%234FA588'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='16' y='21' font-family='Inter,Arial,sans-serif' font-size='13' font-weight='700' fill='white' text-anchor='middle'>GP</text></svg>" />

<body>
  <div id="root"><div id="boot">Carregando a agenda…</div></div>

    window.addEventListener('error', function (e) {
      var r = document.getElementById('root');
      if (r) r.innerHTML = '<div style="font-family:system-ui,sans-serif;max-width:520px;margin:60px auto;padding:24px;border:1px solid #E4E8E3;border-radius:16px;color:#1F2A24">'
        + '<b>Não foi possível abrir a agenda.</b><br><br>'
        + 'Verifique se você está conectado à internet (o estilo visual é baixado on-line) e recarregue a página.<br><br>'
        + '<span style="color:#8A968D;font-size:13px">Detalhe técnico: ' + (e.message || 'erro desconhecido') + '</span></div>';
    });
  </script>
